// ============== Keyboard ==============
document.addEventListener('keydown', e => {
  if (state.textInput || $('newMapModal').classList.contains('active')) return;
  if (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA') return;

  if (e.code === 'Space') {
    e.preventDefault();
    state.isSpacePressed = true;
    canvasDraw.style.cursor = 'grab';
    return;
  }

  // Delete/Backspace - delete selected
  if ((e.key === 'Delete' || e.key === 'Backspace') && state.selectedStrokeIds.length > 0) {
    e.preventDefault();
    deleteSelected();
    return;
  }

  // Esc - deselect
  if (e.key === 'Escape' && state.selectedStrokeIds.length > 0) {
    state.selectedStrokeIds = [];
    redrawLayers();
    return;
  }

  // Arrow keys - move selected strokes
  if (state.selectedStrokeIds.length > 0 && ['ArrowUp','ArrowDown','ArrowLeft','ArrowRight'].includes(e.key)) {
    e.preventDefault();
    const step = e.shiftKey ? 10 : 1;
    let dx = 0, dy = 0;
    if (e.key === 'ArrowUp') dy = -step;
    else if (e.key === 'ArrowDown') dy = step;
    else if (e.key === 'ArrowLeft') dx = -step;
    else if (e.key === 'ArrowRight') dx = step;
    moveSelected(dx, dy);
    return;
  }

  // Ctrl+A - select all in active layer
  if ((e.ctrlKey || e.metaKey) && e.key === 'a' && state.tool === 'select') {
    e.preventDefault();
    selectAllInActiveLayer();
    return;
  }

  // Ctrl+C - copy selected
  if ((e.ctrlKey || e.metaKey) && e.key === 'c' && state.selectedStrokeIds.length > 0) {
    e.preventDefault();
    copySelected();
    return;
  }

  // Ctrl+X - cut selected
  if ((e.ctrlKey || e.metaKey) && e.key === 'x' && state.selectedStrokeIds.length > 0) {
    e.preventDefault();
    cutSelected();
    return;
  }

  // Ctrl+V - paste from clipboard
  if ((e.ctrlKey || e.metaKey) && e.key === 'v') {
    e.preventDefault();
    pasteFromClipboard();
    return;
  }

  // Ctrl+D - duplicate selected
  if ((e.ctrlKey || e.metaKey) && e.key === 'd' && state.selectedStrokeIds.length > 0) {
    e.preventDefault();
    duplicateSelected();
    return;
  }

  if ((e.ctrlKey || e.metaKey) && e.key === 'z' && !e.shiftKey) { e.preventDefault(); undo(); return; }
  if ((e.ctrlKey || e.metaKey) && (e.key === 'y' || (e.key === 'z' && e.shiftKey))) { e.preventDefault(); redo(); return; }

  // M key - open calibration modal
  if (e.key.toLowerCase() === 'm' && !e.ctrlKey && !e.metaKey) {
    e.preventDefault();
    openScaleModal();
    return;
  }

  const map = {v:'select', p:'pen', l:'line', a:'arrow', r:'rect', c:'circle', t:'text', e:'eraser', h:'hand'};
  const tool = map[e.key.toLowerCase()];
  if (tool) {
    document.querySelectorAll('.tool-btn').forEach(b => b.classList.remove('active'));
    document.querySelector(`.tool-btn[data-tool="${tool}"]`).classList.add('active');
    state.tool = tool;
    if (tool !== 'select' && state.selectedStrokeIds.length > 0) {
      state.selectedStrokeIds = [];
      redrawLayers();
    }
    if (tool === 'hand') canvasDraw.style.cursor = 'grab';
    else if (tool === 'select') canvasDraw.style.cursor = 'default';
    else canvasDraw.style.cursor = 'crosshair';
  }
});

// Delete selected strokes
function deleteSelected() {
  const m = getActiveMap();
  if (!m || state.selectedStrokeIds.length === 0) return;
  m.layers.forEach(layer => {
    layer.strokes = layer.strokes.filter(s => !state.selectedStrokeIds.includes(s.id));
  });
  const count = state.selectedStrokeIds.length;
  state.selectedStrokeIds = [];
  pushHistory();
  redrawLayers();
  save();
  showToast(`已刪除 ${count} 個項目`, 'success');
}

// Select all in active layer
function selectAllInActiveLayer() {
  const layer = getActiveLayer();
  if (!layer || !layer.visible) return;
  state.selectedStrokeIds = layer.strokes.map(s => s.id);
  redrawLayers();
  showToast(`已選取圖層內 ${state.selectedStrokeIds.length} 個項目`);
}

// Move selected strokes by dx, dy (used by arrow keys)
let arrowMoveTimer = null;
function moveSelected(dx, dy) {
  const m = getActiveMap();
  if (!m || state.selectedStrokeIds.length === 0) return;
  m.layers.forEach(layer => {
    layer.strokes.forEach(s => {
      if (state.selectedStrokeIds.includes(s.id)) {
        translateStroke(s, dx, dy);
      }
    });
  });
  redrawLayers();
  // Debounce: save and push history only after user stops pressing
  clearTimeout(arrowMoveTimer);
  arrowMoveTimer = setTimeout(() => {
    pushHistory();
    save();
  }, 400);
}

// Duplicate selected (in-place +20px offset, no clipboard involved)
function duplicateSelected() {
  const m = getActiveMap();
  if (!m || state.selectedStrokeIds.length === 0) return;
  const newIds = [];
  m.layers.forEach(layer => {
    const toDup = layer.strokes.filter(s => state.selectedStrokeIds.includes(s.id));
    toDup.forEach(s => {
      const copy = JSON.parse(JSON.stringify(s));
      copy.id = uid();
      translateStroke(copy, 20, 20);
      layer.strokes.push(copy);
      newIds.push(copy.id);
    });
  });
  state.selectedStrokeIds = newIds;
  pushHistory();
  redrawLayers();
  save();
  showToast(`已複製 ${newIds.length} 個項目`, 'success');
}

// Copy selected to clipboard (does not modify the canvas)
function copySelected() {
  const m = getActiveMap();
  if (!m || state.selectedStrokeIds.length === 0) {
    showToast('沒有選取任何項目', 'error');
    return;
  }
  const copied = [];
  m.layers.forEach(layer => {
    layer.strokes.forEach(s => {
      if (state.selectedStrokeIds.includes(s.id)) {
        copied.push(JSON.parse(JSON.stringify(s)));
      }
    });
  });
  if (copied.length === 0) return;

  // Calculate bounding box of all copied strokes (used as anchor for paste)
  let minX = Infinity, minY = Infinity, maxX = -Infinity, maxY = -Infinity;
  copied.forEach(s => {
    const b = getStrokeBounds(s);
    if (b) {
      if (b.x < minX) minX = b.x;
      if (b.y < minY) minY = b.y;
      if (b.x + b.w > maxX) maxX = b.x + b.w;
      if (b.y + b.h > maxY) maxY = b.y + b.h;
    }
  });
  state.clipboard = {
    strokes: copied,
    centerX: (minX + maxX) / 2,
    centerY: (minY + maxY) / 2,
  };
  showToast(`已複製 ${copied.length} 個項目`, 'success');
}

// Cut = copy + delete
function cutSelected() {
  const m = getActiveMap();
  if (!m || state.selectedStrokeIds.length === 0) {
    showToast('沒有選取任何項目', 'error');
    return;
  }
  const count = state.selectedStrokeIds.length;
  copySelected();
  // copySelected shows its own toast - override it
  m.layers.forEach(layer => {
    layer.strokes = layer.strokes.filter(s => !state.selectedStrokeIds.includes(s.id));
  });
  state.selectedStrokeIds = [];
  pushHistory();
  redrawLayers();
  save();
  showToast(`已剪下 ${count} 個項目`, 'success');
}

// Paste from clipboard at cursor position (or canvas center if cursor not on canvas)
function pasteFromClipboard() {
  if (!state.clipboard || !state.clipboard.strokes.length) {
    showToast('剪貼簿是空的', 'error');
    return;
  }
  const m = getActiveMap();
  if (!m) {
    showToast('請先建立場地', 'error');
    return;
  }
  const layer = getActiveLayer();
  if (!layer || !layer.visible) {
    showToast('請選擇可見的圖層', 'error');
    return;
  }

  // Determine paste anchor point (canvas coordinates)
  let pastePt;
  if (state.lastMousePos) {
    const rect = canvasArea.getBoundingClientRect();
    // Check mouse is within canvas area
    const mx = state.lastMousePos.clientX;
    const my = state.lastMousePos.clientY;
    if (mx >= rect.left && mx <= rect.right && my >= rect.top && my <= rect.bottom) {
      pastePt = clientToCanvas(mx, my);
    }
  }
  if (!pastePt) {
    // Fallback: paste at center of visible canvas area
    const rect = canvasArea.getBoundingClientRect();
    pastePt = clientToCanvas(rect.left + rect.width/2, rect.top + rect.height/2);
  }

  // Translate each stroke so the clipboard's center moves to pastePt
  const dx = pastePt.x - state.clipboard.centerX;
  const dy = pastePt.y - state.clipboard.centerY;

  const newIds = [];
  state.clipboard.strokes.forEach(s => {
    const copy = JSON.parse(JSON.stringify(s));
    copy.id = uid();
    translateStroke(copy, dx, dy);
    layer.strokes.push(copy);
    newIds.push(copy.id);
  });

  // Select the newly pasted items
  state.selectedStrokeIds = newIds;
  // Switch to select tool so user can immediately move/adjust
  if (state.tool !== 'select') {
    state.tool = 'select';
    document.querySelectorAll('.tool-btn').forEach(b => b.classList.remove('active'));
    document.querySelector('.tool-btn[data-tool="select"]')?.classList.add('active');
    canvasDraw.style.cursor = 'default';
  }
  pushHistory();
  redrawLayers();
  save();
  showToast(`已貼上 ${newIds.length} 個項目`, 'success');
}

document.addEventListener('keyup', e => {
  if (e.code === 'Space') {
    state.isSpacePressed = false;
    canvasDraw.style.cursor = state.tool === 'hand' ? 'grab' : 'crosshair';
  }
});

// ============== Auth & Init ==============
async function showApp() {
  $('appRoot').style.display = 'grid';
  $('userEmail').textContent = state.user.email;

  await load();

  renderTabs();
  renderLayers();
  renderCanvas();
  if (getActiveMap()) fitToWindow();
  canvasDraw.style.cursor = 'default';

  setTimeout(() => {
    if (state.maps.length === 0) {
      showToast('快捷鍵: V 選取 / P 畫筆 / T 文字 / E 橡皮擦 / 空白鍵+拖曳 平移');
    } else {
      showToast(`已載入 ${state.maps.length} 個場地`, 'success');
    }
  }, 500);
}

// Back-to-admin button
$('logoutBtn').addEventListener('click', async () => {
  // Try one final sync before leaving
  if (state.pendingMapSaves.size > 0 || state.pendingLayerSaves.size > 0) {
    clearTimeout(state.saveTimer);
    await syncToSupabase();
  }
  // Don't actually log out - just go back to admin (keep session alive)
  window.location.href = '/';
});

// Check existing session on page load - no login screen, redirect if not logged in
(async () => {
  const { data: { session } } = await supabase.auth.getSession();
  if (session && session.user) {
    state.user = session.user;
    await showApp();
  } else {
    // Not logged in - redirect back to admin login
    alert('請先登入後台才能使用場地規劃工具');
    window.location.href = '/';
  }
})();

window.addEventListener('resize', () => {
  if (getActiveMap()) applyTransform();
});

// Warn before leaving if there are pending saves
window.addEventListener('beforeunload', e => {
  if (state.pendingMapSaves.size > 0 || state.pendingLayerSaves.size > 0) {
    e.preventDefault();
    e.returnValue = '還有未同步的變更,確定要離開嗎?';
    return e.returnValue;
  }
});
</script>
